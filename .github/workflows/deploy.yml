name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 推送到 main 分支時自動部署
  workflow_dispatch:  # 允許在 GitHub 介面手動觸發

# 設定 GitHub Pages 部署所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署進行，避免衝突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉取程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. 打包靜態檔案（根目錄直接上傳）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # 網站根目錄，index.html 就在這裡

      # 4. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
